<!DOCTYPE html>
<html>
<head>
  <title>Gemini API Update</title>
</head>
<body>

<a href="GroqAPITest.html">
  <h2>Groq API Test</h2>
</a>
<h2>Gemini Test Update</h2>
<textarea id="prompt" rows="4" cols="50">Write a product ad for a red sneaker</textarea>
<br><br>
<button onclick="generate()">Generate</button>

<pre id="output"></pre>

<script>
async function generate() {
  const apiKey = "AIzaSyArevlMKjJTNsYknK0gT9H4eO9_X5mG-bw";
  const prompt = document.getElementById("prompt").value;

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: prompt }]
        }]
      })
    }
  );

  const data = await response.json();

  console.log(data);

  document.getElementById("output").innerText =
    data.candidates?.[0]?.content?.parts?.[0]?.text ||
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
